coverage:
  ignore:
    - src/errors.rs
    - src/input.rs
    - src/color.rs
    - src/debug.rs
    - src/main.rs
  status:
    project:
      default:
        target: auto
        threshold: 10%
        base: auto
    patch:
      default:
        target: 50%
        threshold: 2%
        base: auto
    comment:
      layout: "diff, flags, files"
      require_changes: false

