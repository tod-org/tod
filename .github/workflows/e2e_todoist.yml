# End-to-end tests against the live Todoist API.
# Runs the Rust e2e_todoist suite with an explicit test list.

name: E2E Todoist Integration Tests

on:
  workflow_dispatch:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: e2e-todoist
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  e2e:
    name: E2E Todoist API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Run Todoist e2e test set (serial)
        env:
          TOD_E2E_TOKEN: ${{ secrets.TODOIST_DEV_API_TEST }}
        run: |
          test -n "${TOD_E2E_TOKEN}" || { echo "TODOIST_DEV_API_TEST secret is required"; exit 1; }
          cargo nextest run --features e2e --profile e2e --no-fail-fast
