# End-to-end integration tests that run Tod against the live Todoist API.
# Uses the Tod_DEV_CI project (mutable) and TOD_DEV_CI_STATIC project
# (read-only fixture) in the dev Todoist account.
#
# Split into independent jobs by what they touch, so a failure in one area
# doesn't block or get confused with another, and unrelated jobs can run in
# parallel once the binary is built:
#   - cli_only:               no config, no API calls (version/help/config lifecycle)
#   - static_queries:         API calls, but read-only against TOD_DEV_CI_STATIC
#   - dynamic_tasks:          API calls that create/complete/delete against Tod_DEV_CI
#   - temp_project_lifecycle: API calls against a brand-new, uniquely-named
#                             project created and deleted within the job

name: E2E Todoist Integration Tests

on:
  workflow_dispatch:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  # Disable spinners so output is clean for scripted assertions
  DISABLE_SPINNER: "1"
  TOD_BIN: ./target/release/tod
  # Project name in the dev Todoist account
  TOD_PROJECT: Tod_DEV_CI
  # Read-only fixture project: fixed tasks/dates/priorities/labels/section,
  # provisioned manually, never created/completed/deleted by this workflow.
  TOD_STATIC_PROJECT: TOD_DEV_CI_STATIC

concurrency:
  # Allow only one E2E run at a time to prevent parallel runs corrupting shared Todoist state
  group: e2e-todoist
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # --- Build once, share the binary across the other jobs ---------------------
  build:
    name: Build tod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: rustup toolchain install stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Build tod
        run: cargo build --release

      - name: Upload tod binary
        uses: actions/upload-artifact@v4
        with:
          name: tod-binary
          path: target/release/tod
          retention-days: 1

  # --- CLI-only: no config, no live API calls ----------------------------------
  cli_only:
    name: E2E - CLI-only (version, help, config lifecycle)
    needs: build
    runs-on: ubuntu-latest
    env:
      TOD_SCRATCH_CONFIG: /tmp/tod-e2e-scratch.cfg

    steps:
      - name: Download tod binary
        uses: actions/download-artifact@v4
        with:
          name: tod-binary
          path: target/release

      - name: Make binary executable
        run: chmod +x "$TOD_BIN"

      - name: Verify --version prints a version string
        run: |
          output=$($TOD_BIN --version)
          echo "$output"
          echo "$output" | grep -qE "^tod [0-9]+\.[0-9]+\.[0-9]+" \
            || { echo "FAIL: --version did not print the expected format"; exit 1; }
          echo "[OK] --version OK"

      - name: Verify --help lists all top-level commands
        run: |
          output=$($TOD_BIN --help)
          echo "$output"
          for cmd in project section task list config auth shell; do
            echo "$output" | grep -q "  $cmd " \
              || { echo "FAIL: --help missing '$cmd' command"; exit 1; }
          done
          echo "[OK] --help lists all expected top-level commands"

      # Uses TOD_SCRATCH_CONFIG, isolated to this job's own runner/VM.
      - name: "Config reset (happy path) - delete an existing config file"
        run: |
          # Any valid file works; reset doesn't parse it, just deletes it.
          echo "placeholder" > "$TOD_SCRATCH_CONFIG"
          $TOD_BIN --config "$TOD_SCRATCH_CONFIG" config reset --force
          if [ -f "$TOD_SCRATCH_CONFIG" ]; then
            echo "FAIL: config file still exists after reset"; exit 1
          fi
          echo "[OK] config reset deleted the file"

      - name: "Config reset (error path) - message for a missing config file"
        run: |
          # KNOWN ISSUE: `config reset --help` documents "Errors if the file
          # does not exist", implying a nonzero exit code. In practice (confirmed
          # against a real build) tod prints "No config file found at ..." but
          # still exits 0. Worth filing upstream; until then this asserts on
          # the message (the reliable part) and records the exit code as
          # informational rather than failing the build on it.
          if [ -f "$TOD_SCRATCH_CONFIG" ]; then
            echo "FAIL: scratch config unexpectedly exists before this test"; exit 1
          fi
          set +e
          output=$($TOD_BIN --config "$TOD_SCRATCH_CONFIG" config reset --force 2>&1)
          code=$?
          set -e
          echo "$output"
          echo "(exit code: $code - currently 0 due to the known issue above, not asserted on)"
          echo "$output" | grep -q "No config file found" \
            || { echo "FAIL: expected a 'No config file found' message"; exit 1; }
          echo "[OK] config reset prints the expected not-found message"

      - name: Verify config check-version does not need a config file
        run: |
          # Documented to work without a config; run against a definitely-absent
          # path to prove it doesn't silently depend on one. Only assert the
          # process completes cleanly (exit 0 = up to date, 1 = out of date are
          # both valid outcomes here); anything else indicates a crash.
          set +e
          $TOD_BIN --config /tmp/tod-e2e-does-not-exist.cfg config check-version
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 1 ]; then
            echo "FAIL: check-version exited with unexpected code $code"; exit 1
          fi
          echo "[OK] config check-version exited $code (0 or 1, as expected)"

      - name: Remove scratch config
        if: always()
        run: rm -f "$TOD_SCRATCH_CONFIG"

  # --- Static fixture project: list/filter/sort - read-only, never mutates ----
  static_queries:
    name: E2E - Static project queries (list, filter, sort)
    needs: build
    runs-on: ubuntu-latest
    env:
      TOD_CONFIG: /tmp/tod-e2e-static.cfg

    steps:
      - name: Download tod binary
        uses: actions/download-artifact@v4
        with:
          name: tod-binary
          path: target/release

      - name: Make binary executable
        run: chmod +x "$TOD_BIN"

      # Write the config by calling tod auth api with the secret token.
      # This creates a fresh config file at TOD_CONFIG without any interactive prompts.
      - name: Set API token in config
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_DEV_API_TEST }}
        run: |
          $TOD_BIN --config "$TOD_CONFIG" auth token "$TODOIST_API_TOKEN"
          echo "Config initialised at $TOD_CONFIG"

      - name: Import all Todoist projects into config
        run: $TOD_BIN --config "$TOD_CONFIG" project import --auto

      - name: Verify TOD_DEV_CI_STATIC fixture project is in config
        run: |
          $TOD_BIN --config "$TOD_CONFIG" project list | grep -q "$TOD_STATIC_PROJECT" \
            || { echo "FAIL: $TOD_STATIC_PROJECT not found in config after import"; exit 1; }
          echo "[OK] $TOD_STATIC_PROJECT is available"

      # TOD_DEV_CI_STATIC is provisioned by hand and never mutated by this
      # workflow. It contains exactly 6 tasks:
      #   - "Overdue High Priority"                     due 2020-01-01, p4
      #   - "Overdue Medium Priority"                    due 2020-06-15, p3
      #   - "Future Low Priority Labeled"                due 2099-12-31, p2, @e2estatic
      #   - "No Date No Label"                           no due date,    p1
      #   - "Section Task No Date"                       no due date,    p1, in "Static Section"
      #   - "Section Task Future High Priority Labeled"  due 2099-06-15, p4, @e2estatic, in "Static Section"
      # Dates are far in the past/future on purpose so "overdue" and "future"
      # stay true indefinitely, regardless of when CI runs.
      - name: "Static project - sort by value (priority desc, ignores date)"
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" list view --project "$TOD_STATIC_PROJECT" --sort value)
          echo "$output"
          names=$(echo "$output" | grep '^- ')
          # Positions 1-4 are strictly priority-ordered (p4, p4, p3, p2); the
          # two p1 tasks tie for last and their relative order isn't
          # guaranteed, so those two are checked by membership only.
          echo "$names" | sed -n '1p' | grep -q "Overdue High Priority" \
            || { echo "FAIL: expected p4 task 1st in value sort"; exit 1; }
          echo "$names" | sed -n '2p' | grep -q "Section Task Future High Priority Labeled" \
            || { echo "FAIL: expected 2nd p4 task 2nd in value sort"; exit 1; }
          echo "$names" | sed -n '3p' | grep -q "Overdue Medium Priority" \
            || { echo "FAIL: expected p3 task 3rd in value sort"; exit 1; }
          echo "$names" | sed -n '4p' | grep -q "Future Low Priority Labeled" \
            || { echo "FAIL: expected p2 task 4th in value sort"; exit 1; }
          echo "$names" | tail -2 | grep -q "No Date No Label" \
            || { echo "FAIL: missing No Date No Label in last two"; exit 1; }
          echo "$names" | tail -2 | grep -q "Section Task No Date" \
            || { echo "FAIL: missing Section Task No Date in last two"; exit 1; }
          echo "[OK] --sort value matches expected priority ordering"

      - name: "Static project - sort by datetime (no-date first, then due date asc)"
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" list view --project "$TOD_STATIC_PROJECT" --sort datetime)
          echo "$output"
          names=$(echo "$output" | grep '^- ')
          echo "$names" | sed -n '3p' | grep -q "Overdue High Priority" \
            || { echo "FAIL: expected 2020-01-01 task 3rd in datetime sort"; exit 1; }
          echo "$names" | sed -n '4p' | grep -q "Overdue Medium Priority" \
            || { echo "FAIL: expected 2020-06-15 task 4th in datetime sort"; exit 1; }
          echo "$names" | sed -n '5p' | grep -q "Section Task Future High Priority Labeled" \
            || { echo "FAIL: expected 2099-06-15 task 5th in datetime sort"; exit 1; }
          echo "$names" | sed -n '6p' | grep -q "Future Low Priority Labeled" \
            || { echo "FAIL: expected 2099-12-31 task 6th in datetime sort"; exit 1; }
          echo "[OK] --sort datetime matches expected date ordering"

      - name: "Static project - filter by priority (p1 filter syntax = raw priority 4)"
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" list view --filter "#$TOD_STATIC_PROJECT & p1")
          echo "$output"
          count=$(echo "$output" | grep -c '^- ')
          [ "$count" -eq 2 ] || { echo "FAIL: expected 2 tasks, got $count"; exit 1; }
          echo "$output" | grep -q "Overdue High Priority" \
            || { echo "FAIL: missing Overdue High Priority"; exit 1; }
          echo "$output" | grep -q "Section Task Future High Priority Labeled" \
            || { echo "FAIL: missing Section Task Future High Priority Labeled"; exit 1; }
          echo "[OK] p1 filter returns exactly the two raw-priority-4 tasks"

      - name: "Static project - filter by label (@e2estatic)"
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" list view --filter "#$TOD_STATIC_PROJECT & @e2estatic")
          echo "$output"
          count=$(echo "$output" | grep -c '^- ')
          [ "$count" -eq 2 ] || { echo "FAIL: expected 2 labeled tasks, got $count"; exit 1; }
          echo "$output" | grep -q "Future Low Priority Labeled" \
            || { echo "FAIL: missing Future Low Priority Labeled"; exit 1; }
          echo "$output" | grep -q "Section Task Future High Priority Labeled" \
            || { echo "FAIL: missing Section Task Future High Priority Labeled"; exit 1; }
          echo "[OK] @e2estatic filter returns exactly the two labeled tasks"

      - name: "Static project - filter by section (Static Section)"
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" list view --filter "#$TOD_STATIC_PROJECT & /Static Section")
          echo "$output"
          count=$(echo "$output" | grep -c '^- ')
          [ "$count" -eq 2 ] || { echo "FAIL: expected 2 tasks in Static Section, got $count"; exit 1; }
          echo "$output" | grep -q "Section Task No Date" \
            || { echo "FAIL: missing Section Task No Date"; exit 1; }
          echo "$output" | grep -q "Section Task Future High Priority Labeled" \
            || { echo "FAIL: missing Section Task Future High Priority Labeled"; exit 1; }
          echo "[OK] section filter returns exactly the two tasks in Static Section"

      - name: Remove temp config
        if: always()
        run: rm -f "$TOD_CONFIG"

  # --- Dynamic task tests: create/complete/delete against Tod_DEV_CI ----------
  dynamic_tasks:
    name: E2E - Dynamic task tests (create, sort, quick-add, label)
    needs: build
    runs-on: ubuntu-latest
    env:
      TOD_CONFIG: /tmp/tod-e2e-dynamic.cfg

    steps:
      - name: Download tod binary
        uses: actions/download-artifact@v4
        with:
          name: tod-binary
          path: target/release

      - name: Make binary executable
        run: chmod +x "$TOD_BIN"

      # Write the config by calling tod auth api with the secret token.
      # This creates a fresh config file at TOD_CONFIG without any interactive prompts.
      # Timezone and other settings are populated automatically on the first API call.
      - name: Set API token in config
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_DEV_API_TEST }}
        run: |
          $TOD_BIN --config "$TOD_CONFIG" auth token "$TODOIST_API_TOKEN"
          echo "Config initialised at $TOD_CONFIG"

      # Import all projects from Todoist into the local config so tod can address them by name.
      - name: Import all Todoist projects into config
        run: $TOD_BIN --config "$TOD_CONFIG" project import --auto

      - name: Verify Tod_DEV_CI project is in config
        run: |
          $TOD_BIN --config "$TOD_CONFIG" project list | grep -q "$TOD_PROJECT" \
            || { echo "FAIL: $TOD_PROJECT not found in config after import"; exit 1; }
          echo "[OK] $TOD_PROJECT is available"

      # Pre-test cleanup: complete any leftover tasks from a previous failed run so we
      # start with an empty project.
      - name: Pre-test cleanup - empty Tod_DEV_CI of any leftover tasks
        run: |
          set -euo pipefail
          echo "Checking for leftover tasks..."
          for i in $(seq 1 20); do
            output=$($TOD_BIN --config "$TOD_CONFIG" task next --project "$TOD_PROJECT" 2>&1)
            echo "$output"
            if echo "$output" | grep -q "No tasks on list"; then
              echo "[OK] Project is already clean"
              break
            fi
            # Only complete tasks we created; bail if we find a non-E2E task
            if ! echo "$output" | grep -q "\[E2E\]"; then
              echo "FAIL: Unexpected non-E2E task found in $TOD_PROJECT; refusing to continue"
              exit 1
            fi
            echo "Completing leftover task $i..."
            $TOD_BIN --config "$TOD_CONFIG" task complete
          done

      # --- Create test tasks ----------------------------------------------------
      # Create four tasks covering every priority level.
      # Using --no-section avoids any interactive section-selection prompt.
      # Task names are prefixed with [E2E] for easy identification in cleanup.
      - name: Create test tasks with all four priority levels
        run: |
          $TOD_BIN --config "$TOD_CONFIG" task create \
            --content "[E2E] High Priority Task" \
            --project "$TOD_PROJECT" \
            --priority 4 \
            --no-section

          $TOD_BIN --config "$TOD_CONFIG" task create \
            --content "[E2E] Medium Priority Task" \
            --project "$TOD_PROJECT" \
            --priority 3 \
            --no-section

          $TOD_BIN --config "$TOD_CONFIG" task create \
            --content "[E2E] No Priority Task" \
            --project "$TOD_PROJECT" \
            --priority 1 \
            --no-section

          $TOD_BIN --config "$TOD_CONFIG" task create \
            --content "[E2E] Low Priority Task" \
            --project "$TOD_PROJECT" \
            --priority 2 \
            --no-section

      # --- Verify tasks exist ---------------------------------------------------
      - name: Verify all four tasks appear in list view
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" list view --project "$TOD_PROJECT")
          echo "$output"
          echo "$output" | grep -q "\[E2E\] High Priority Task" || { echo "FAIL: High not found"; exit 1; }
          echo "$output" | grep -q "\[E2E\] Medium Priority Task" || { echo "FAIL: Medium not found"; exit 1; }
          echo "$output" | grep -q "\[E2E\] No Priority Task" || { echo "FAIL: None not found"; exit 1; }
          echo "$output" | grep -q "\[E2E\] Low Priority Task" || { echo "FAIL: Low not found"; exit 1; }
          echo "[OK] All four tasks present"

      # --- Verify sort order via task next -------------------------------------
      # Default sort_order is ["priority:desc", "due_date:asc", ...], which sorts
      # by raw Todoist API priority value, descending. No special-casing for
      # unset priority: it's compared using its raw API value (1), same as any
      # other priority level.
      #
      # High   (p4, raw priority 4) <- 1st
      # Medium (p3, raw priority 3) <- 2nd
      # Low    (p2, raw priority 2) <- 3rd
      # None   (p1, raw priority 1) <- 4th (lowest raw value, sorts last)

      - name: "Sort check 1/4 - next task should be High Priority (priority 4)"
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" task next --project "$TOD_PROJECT")
          echo "$output"
          echo "$output" | grep -q "\[E2E\] High Priority Task" \
            || { echo "FAIL: Expected High Priority Task first"; exit 1; }
          echo "[OK] High Priority Task is first"

      - name: Complete High Priority Task
        run: $TOD_BIN --config "$TOD_CONFIG" task complete

      - name: "Sort check 2/4 - next task should be Medium Priority (priority 3)"
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" task next --project "$TOD_PROJECT")
          echo "$output"
          echo "$output" | grep -q "\[E2E\] Medium Priority Task" \
            || { echo "FAIL: Expected Medium Priority Task second"; exit 1; }
          echo "[OK] Medium Priority Task is second"

      - name: Complete Medium Priority Task
        run: $TOD_BIN --config "$TOD_CONFIG" task complete

      - name: "Sort check 3/4 - next task should be Low Priority (priority 2)"
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" task next --project "$TOD_PROJECT")
          echo "$output"
          echo "$output" | grep -q "\[E2E\] Low Priority Task" \
            || { echo "FAIL: Expected Low Priority Task third"; exit 1; }
          echo "[OK] Low Priority Task is third"

      - name: Complete Low Priority Task
        run: $TOD_BIN --config "$TOD_CONFIG" task complete

      - name: "Sort check 4/4 - next task should be No Priority (priority 1, lowest raw value)"
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" task next --project "$TOD_PROJECT")
          echo "$output"
          echo "$output" | grep -q "\[E2E\] No Priority Task" \
            || { echo "FAIL: Expected No Priority Task last"; exit 1; }
          echo "[OK] No Priority Task is last"

      - name: Complete No Priority Task
        run: $TOD_BIN --config "$TOD_CONFIG" task complete

      # --- Verify project is empty ----------------------------------------------
      - name: Verify Tod_DEV_CI project is now empty
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" task next --project "$TOD_PROJECT")
          echo "$output"
          echo "$output" | grep -q "No tasks on list" \
            || { echo "FAIL: Expected empty project after completing all tasks"; exit 1; }
          echo "[OK] Project is empty - all tasks completed"

      # --- Quick-add (NLP task creation) ----------------------------------------
      - name: "Quick-add - create a task via NLP and verify it parsed correctly"
        run: |
          $TOD_BIN --config "$TOD_CONFIG" task quick-add \
            --content "[E2E] Quickadd Task #$TOD_PROJECT p1 tomorrow"
          output=$($TOD_BIN --config "$TOD_CONFIG" list view --project "$TOD_PROJECT")
          echo "$output"
          echo "$output" | grep -q "\[E2E\] Quickadd Task" \
            || { echo "FAIL: quick-add task not found"; exit 1; }
          # p1 in Todoist filter/NLP syntax is urgent (raw priority 4).
          echo "$output" | grep -A1 "\[E2E\] Quickadd Task" | grep -q "!" \
            || { echo "FAIL: quick-add task has no due date parsed from 'tomorrow'"; exit 1; }
          echo "[OK] Quick-add task created with parsed project/priority/due date"

      - name: Complete quick-add task
        run: |
          $TOD_BIN --config "$TOD_CONFIG" task next --project "$TOD_PROJECT"
          $TOD_BIN --config "$TOD_CONFIG" task complete

      # --- Label on task create -------------------------------------------------
      - name: "Label - create a task with a label and verify via filter"
        run: |
          $TOD_BIN --config "$TOD_CONFIG" task create \
            --content "[E2E] Labeled Task" \
            --project "$TOD_PROJECT" \
            --priority 1 \
            --label e2elabel \
            --no-section

          output=$($TOD_BIN --config "$TOD_CONFIG" list view --filter "#$TOD_PROJECT & @e2elabel")
          echo "$output"
          echo "$output" | grep -q "\[E2E\] Labeled Task" \
            || { echo "FAIL: labeled task not returned by @e2elabel filter"; exit 1; }
          echo "[OK] Label applied at creation and filterable via @e2elabel"

      - name: Complete labeled task
        run: |
          $TOD_BIN --config "$TOD_CONFIG" task next --project "$TOD_PROJECT"
          $TOD_BIN --config "$TOD_CONFIG" task complete

      - name: Verify Tod_DEV_CI is empty again after quick-add/label tests
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" task next --project "$TOD_PROJECT")
          echo "$output"
          echo "$output" | grep -q "No tasks on list" \
            || { echo "FAIL: expected empty project after completing quick-add/label tasks"; exit 1; }
          echo "[OK] Project is empty"

      # --- Cleanup --------------------------------------------------------------
      # Always runs, even on failure, so the Todoist account is left clean.
      - name: Cleanup - complete any remaining E2E tasks
        if: always()
        run: |
          if [ ! -f "$TOD_CONFIG" ]; then
            echo "Config missing - skipping cleanup"
            exit 0
          fi
          echo "Completing any remaining [E2E] tasks..."
          for i in $(seq 1 20); do
            output=$($TOD_BIN --config "$TOD_CONFIG" task next --project "$TOD_PROJECT" 2>&1) || break
            echo "$output"
            if echo "$output" | grep -q "No tasks on list"; then
              echo "[OK] Project is clean"
              break
            fi
            # Only complete tasks we created; bail if we find a non-E2E task
            if ! echo "$output" | grep -q "\[E2E\]"; then
              echo "WARNING: Unexpected non-E2E task found - stopping cleanup to avoid data loss"
              break
            fi
            $TOD_BIN --config "$TOD_CONFIG" task complete
          done

      - name: Remove temp config
        if: always()
        run: rm -f "$TOD_CONFIG"

  # --- Temp project lifecycle: create, section create, delete -----------------
  # Runs against a brand-new, uniquely-named project created just for this job,
  # never Tod_DEV_CI or TOD_DEV_CI_STATIC - so it's safe to run in parallel with
  # the other jobs. `project delete` removes the project from Todoist itself
  # (confirmed to run non-interactively, no confirmation prompt, exits cleanly).
  temp_project_lifecycle:
    name: E2E - Temp project lifecycle (create, section, delete)
    needs: build
    runs-on: ubuntu-latest
    env:
      TOD_CONFIG: /tmp/tod-e2e-temp-project.cfg
      TOD_TEMP_PROJECT: Tod_E2E_Temp_${{ github.run_id }}_${{ github.run_attempt }}

    steps:
      - name: Download tod binary
        uses: actions/download-artifact@v4
        with:
          name: tod-binary
          path: target/release

      - name: Make binary executable
        run: chmod +x "$TOD_BIN"

      - name: Set API token in config
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_DEV_API_TEST }}
        run: |
          $TOD_BIN --config "$TOD_CONFIG" auth token "$TODOIST_API_TOKEN"
          echo "Config initialised at $TOD_CONFIG"

      - name: Create temp project
        run: |
          $TOD_BIN --config "$TOD_CONFIG" project create -n "$TOD_TEMP_PROJECT"
          $TOD_BIN --config "$TOD_CONFIG" project list | grep -q "$TOD_TEMP_PROJECT" \
            || { echo "FAIL: $TOD_TEMP_PROJECT not found in config after create"; exit 1; }
          echo "[OK] Temp project created and added to config"

      # section has no `delete` subcommand, and task create has no --section
      # flag, so this is a smoke test that section creation itself succeeds -
      # not a test of tasks landing inside it. Filter/list behavior on a
      # populated section is already covered against the static fixture.
      - name: Create a section in the temp project
        run: |
          output=$($TOD_BIN --config "$TOD_CONFIG" section create -n "Temp Section" -p "$TOD_TEMP_PROJECT")
          echo "$output"
          echo "$output" | grep -qi "section created" \
            || { echo "FAIL: unexpected output from section create"; exit 1; }
          echo "[OK] Section created in temp project"

      - name: Delete temp project
        run: |
          $TOD_BIN --config "$TOD_CONFIG" project delete -p "$TOD_TEMP_PROJECT"
          echo "[OK] Temp project deleted"

      - name: Verify deletion - deleting again should fail
        run: |
          if $TOD_BIN --config "$TOD_CONFIG" project delete -p "$TOD_TEMP_PROJECT" 2>/tmp/delete-err.txt; then
            echo "FAIL: second delete of an already-deleted project unexpectedly succeeded"
            exit 1
          fi
          cat /tmp/delete-err.txt
          echo "[OK] Second delete correctly failed - project is really gone"

      # Safety net: if an earlier step failed before the delete ran, try once
      # more here so a crashed job doesn't leave a stray project behind.
      # Errors are ignored since the project may already be gone.
      - name: Cleanup - ensure temp project is deleted
        if: always()
        run: |
          if [ -f "$TOD_CONFIG" ]; then
            $TOD_BIN --config "$TOD_CONFIG" project delete -p "$TOD_TEMP_PROJECT" 2>/dev/null || true
          fi
          rm -f "$TOD_CONFIG"
